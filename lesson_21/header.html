<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="scss/header.css" />
    <title>Header</title>
  </head>
  <body>
    <section class="header">
      <div class="header__container">
        <div class="header__logo">
          <img
            class="header__img"
            src="img/euphoria/header/logo.svg"
            alt="logo" />
        </div>

        <div class="header__menu menu">
          <nav class="menu__body">
            <ul class="menu__list">
              <li class="menu__item">
                <a href="#" class="menu__link menu__link--mark">Shop</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Men</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Women</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Combos</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Joggers</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Joggers</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Joggers</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Joggers</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class="header__search search">
          <div class="search__img">
            <img src="img/euphoria/header/search.svg" alt="search" />
          </div>
          <div class="search__body">
            <div class="search__item"></div>
            <div class="search__placeholder">Search</div>
          </div>
        </div>

        <div class="header__actions actions">
          <a href="#" class="actions__link"
            ><img src="img/euphoria/header/heart.svg" alt="fav"
          /></a>
          <a href="#" class="actions__link"
            ><img src="img/euphoria/header/user.svg" alt="user"
          /></a>
          <a href="#" class="actions__link"
            ><img src="img/euphoria/header/cart.svg" alt="cart"
          /></a>
        </div>
      </div>
    </section>
  </body>
</html>
