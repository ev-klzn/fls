<body>
  <section class="header">
    <div class="header__container">
      <div class="header__logo">
        <img
          class="header__img"
          src="img/euphoria/header/logo.svg"
          alt="logo">
      </div>

      <div class="header__menu menu">
        <nav class="menu__body">
          <ul class="menu__list">
            <li class="menu__item">
              <a href="#" class="menu__link menu__link--mark">Shop</a>
            </li>
            <li class="menu__item">
              <a href="#" class="menu__link">Men</a>
            </li>
            <li class="menu__item">
              <a href="#" class="menu__link">Women</a>
            </li>
            <li class="menu__item">
              <a href="#" class="menu__link">Combos</a>
            </li>
            <li class="menu__item">
              <a href="#" class="menu__link">Joggers</a>
            </li>
          </ul>
        </nav>
      </div>

      <form class="header__search search">
        <input
          class="search__body"
          autocomplete="off"
          name="search"
          placeholder="Search"
          type="text">
      </form>

      <div class="header__actions actions">
        <a href="#" class="actions__link"
          ><img src="img/euphoria/header/heart.svg" alt="fav"
       ></a>
        <a href="#" class="actions__link"
          ><img src="img/euphoria/header/user.svg" alt="user"
       ></a>
        <a href="#" class="actions__link"
          ><img src="img/euphoria/header/cart.svg" alt="cart"
       ></a>
      </div>
    </div>
  </section>
</body>
